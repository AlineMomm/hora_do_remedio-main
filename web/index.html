<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hora do Remédio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Hora do Remédio</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1976D2;
    }
    
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1976D2 0%, #2196F3 100%);
      color: white;
      font-family: 'Roboto', sans-serif;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script>
    // Configuração do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyC_gGil9MXuz6agSXHC05vTS8c9FV7i07s",
      authDomain: "hora-do-remedio-165b3.firebaseapp.com",
      projectId: "hora-do-remedio-165b3",
      storageBucket: "hora-do-remedio-165b3.firebasestorage.app",
      messagingSenderId: "828522686230",
      appId: "1:828522686230:web:1376d1593159d158671237"
    };

    // Inicializar Firebase
    try {
      firebase.initializeApp(firebaseConfig);
      console.log('✅ Firebase inicializado com sucesso');
    } catch (e) {
      console.error('❌ Erro ao inicializar Firebase:', e);
    }
  </script>
  
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="loading-spinner"></div>
    <div>Carregando Hora do Remédio...</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Verificar se o Flutter está carregado
      if (typeof _flutter === 'undefined') {
        console.error('❌ Flutter não carregado!');
        document.getElementById('loading').innerHTML = 
          '<div>Erro: Flutter não carregado. Recarregue a página.</div>';
        return;
      }

      console.log('✅ Flutter carregado, iniciando...');
      
      // Carregar o Flutter sem service worker por enquanto
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          console.log('✅ Engine initializer pronto');
          engineInitializer.initializeEngine().then(function(appRunner) {
            console.log('✅ App runner pronto');
            // Esconder a tela de loading
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          }).catch(function(error) {
            console.error('❌ Erro ao inicializar engine:', error);
            document.getElementById('loading').innerHTML = 
              '<div>Erro: ' + error.message + '</div>';
          });
        }
      }).catch(function(error) {
        console.error('❌ Erro ao carregar entrypoint:', error);
        document.getElementById('loading').innerHTML = 
          '<div>Erro: ' + error.message + '</div>';
      });
    });
  </script>
</body>
</html>
